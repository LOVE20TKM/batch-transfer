[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.17"
optimizer = true
optimizer_runs = 200
bytecode_hash = "none"
cbor_metadata = false

# File system permissions for deployment scripts
fs_permissions = [
    { access = "read-write", path = "./script/network/" }
]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
